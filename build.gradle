import org.jetbrains.kotlin.gradle.dsl.JvmTarget
import org.jetbrains.kotlin.gradle.tasks.KotlinCompile

plugins {
	id 'net.fabricmc.fabric-loom' version "1.16-SNAPSHOT"
	id 'maven-publish'
	id "org.jetbrains.kotlin.jvm" version "2.3.0"
}

def mcVersion = sc.current.version
// These lines make the mod filename `{mod.id}-${mod.version}+${sc.current.version}.jar`
version = "${property('mod.version')}+${mcVersion}"
base.archivesName = property('mod.id') as String
group = project.maven_group

loom {
	splitEnvironmentSourceSets()

	mods {
		"meowmeals" {
			sourceSet sourceSets.main
			sourceSet sourceSets.client
		}
	}

}

fabricApi {
	configureDataGeneration {
		client = true
	}
}

dependencies {
	// To change the versions see the gradle.properties file
	minecraft "com.mojang:minecraft:${mcVersion}"

	implementation "net.fabricmc:fabric-loader:${property('deps.fabric_loader')}"
	implementation "net.fabricmc.fabric-api:fabric-api:${property("deps.fabric_api")}"
	implementation "net.fabricmc:fabric-language-kotlin:${property("deps.fabric_kotlin")}"
}

processResources {
	inputs.property("minecraft_version", mcVersion)
	inputs.property("version", version)
	filesMatching("fabric.mod.json") {
		expand([
				"minecraft_version": mcVersion,
				"version"          : version
		])
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 25
}

tasks.withType(KotlinCompile).configureEach {
	compilerOptions {
		jvmTarget = JvmTarget.JVM_25
	}
}

java {
	// Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
	// if it is present.
	// If you remove this line, sources will not be generated.
	withSourcesJar()

	sourceCompatibility = JavaVersion.VERSION_25
	targetCompatibility = JavaVersion.VERSION_25
}

jar {
	inputs.property "archivesName", base.archivesName

	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}"}
	}
}